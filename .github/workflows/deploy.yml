name: Deploy Static Content to Pages

on:
  push:
    branches: ["main"] # Change to "master" if your default branch is master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Clears the deprecation warning natively

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Upgraded engine to match current ecosystem defaults

      - name: Install dependencies
        run: npm install

      # If your build script requires an environment variable to pass validation,
      # we stub a blank one here so the build doesn't throw a code error.
      - name: Build Project
        run: npm run build
        env:
          GEMINI_API_KEY: "placeholder-key-for-build-validation"

      # This auto-detects common framework output folders if it isn't strictly './dist'
      - name: Determine Artifact Directory
        id: set-path
        run: |
          if [ -d "./dist" ]; then
            echo "dir=./dist" >> $GITHUB_OUTPUT
          elif [ -d "./out" ]; then
            echo "dir=./out" >> $GITHUB_OUTPUT
          elif [ -d "./build" ]; then
            echo "dir=./build" >> $GITHUB_OUTPUT
          else
            echo "dir=." >> $GITHUB_OUTPUT
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.set-path.outputs.dir }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
